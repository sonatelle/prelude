name: "Check prelude"

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests-flakes:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: pre-commit-hooks
      - run: rm -rf /opt&

      - name: Check root flake
        run: nix flake check -L --show-trace --no-write-lock-file

      # Templates pin github:sonatelle/prelude; override to this checkout so CI
      # validates them against the PR under test.
      - name: Check default template flake
        run: >
          nix flake check path:./templates/default
          --override-input prelude path:.
          -L --show-trace --no-write-lock-file

      - name: Check Go template flake
        run: >
          nix flake check path:./templates/go
          --override-input prelude path:.
          -L --show-trace --no-write-lock-file

      # path:../.. is not reliable once the example is copied into the store;
      # pin prelude to this checkout explicitly.
      - name: Check minimal example flake
        run: >
          nix flake check path:./examples/minimal
          --override-input prelude path:.
          -L --show-trace --no-write-lock-file
